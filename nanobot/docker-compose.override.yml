services:
  nanobot:
    build:
      context: .
      dockerfile: nanobot/Dockerfile
    restart: unless-stopped
    networks:
      - lms-network
    environment:
      - LMS_API_KEY=set-it-to-something-and-remember-it
      - LLM_API_KEY=${QWEN_CODE_API_KEY}
      - LLM_API_BASE_URL=https://openrouter.ai/api/v1
      - LLM_API_MODEL=openrouter/free
      - NANOBOT_LMS_BACKEND_URL=http://backend:8000
      - NANOBOT_GATEWAY_CONTAINER_ADDRESS=0.0.0.0
      - NANOBOT_GATEWAY_CONTAINER_PORT=8080
      - NANOBOT_WEBCHAT_CONTAINER_ADDRESS=0.0.0.0
      - NANOBOT_WEBCHAT_CONTAINER_PORT=8080
      - NANOBOT_WEBCHAT_RELAY_URL=http://nanobot:8080
      - NANOBOT_ACCESS_KEY=${NANOBOT_ACCESS_KEY}
      - NANOBOT_WORKSPACE=/app/nanobot/workspace
    depends_on:
      - backend
      - qwen-code-api

  client-web-flutter:
    build:
      context: ./nanobot-websocket-channel/client-web-flutter
    volumes:
      - client-web-flutter:/output

  caddy:
    volumes:
      - client-web-flutter:/srv/flutter:ro
    depends_on:
      - nanobot
      - client-web-flutter
